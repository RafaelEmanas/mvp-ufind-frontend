<div class="relative w-full">
  <span class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-gray-400">
    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
    </svg>
  </span>
  <input
    type="text"
    [placeholder]="placeholder()"
    [value]="value()"
    (input)="onSearchChange($event)"
    class="w-full rounded-lg border border-gray-200 bg-gray-50 pl-9 pr-4 py-2 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent focus:bg-white transition"
  />
</div>
