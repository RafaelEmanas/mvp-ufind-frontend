<div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
  <div class="w-full aspect-video bg-gray-100 overflow-hidden">
    @if (item().imageUrl) {
      <img [src]="item().imageUrl" [alt]="item().title" class="w-full h-full object-cover" />
    } @else {
      <div class="w-full h-full flex items-center justify-center text-sm text-gray-400">
        Sem imagem
      </div>
    }
  </div>

  <div class="p-4 flex flex-col gap-3">
    <div class="flex items-center gap-2 flex-wrap">
      <h2 class="text-base font-bold text-gray-900">{{ item().title }}</h2>
      <span [class]="badgeClass(item().status ?? '')">
        {{ statusLabel(item().status ?? '') }}
      </span>
    </div>

    <p class="text-sm text-gray-500 leading-relaxed line-clamp-2">
      {{ item().description }}
    </p>

    <div class="flex flex-col gap-1.5 text-xs text-gray-500">
      <div class="flex items-center gap-1.5">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-3.5 h-3.5 shrink-0"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
          />
        </svg>
        <span>{{ item().dateFound ? formatDate(item().dateFound!) : '-' }}</span>
      </div>
      <div class="flex items-center gap-1.5">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-3.5 h-3.5 shrink-0"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"
          />
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"
          />
        </svg>
        <span>{{ item().locationFound }}</span>
      </div>
    </div>
  </div>
</div>
