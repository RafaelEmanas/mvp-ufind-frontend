<div class="bg-white rounded-xl border border-gray-200 shadow-sm px-5 py-4 mb-3 flex items-center gap-3 w-full">
  <div class="flex-1 min-w-0 overflow-hidden">
    <div class="flex items-center gap-2 mb-1 flex-wrap">
      <span class="font-semibold text-gray-900 text-sm">{{ item().title }}</span>
      @if (item().status === 'AVAILABLE') {
        <span class="inline-block bg-green-500 text-white text-xs font-semibold px-2.5 py-0.5 rounded-full whitespace-nowrap">Disponível</span>
      } @else {
        <span class="inline-block bg-gray-600 text-white text-xs font-semibold px-2.5 py-0.5 rounded-full whitespace-nowrap">Resgatado</span>
      }
    </div>
    <p class="text-xs text-gray-400 truncate">{{ item().locationFound }} • {{ item().dateFound ? formatDate(item().dateFound!) : '-' }}</p>
  </div>
  <div class="flex items-center gap-1 shrink-0 ml-auto">
    <button 
      class="p-2 rounded-lg text-gray-400 hover:text-gray-700 hover:bg-gray-100 transition" 
      title="Editar"
      (click)="onEdit()">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536M9 13l6.5-6.5a2 2 0 012.828 2.828L11.828 15.828a2 2 0 01-.707.464l-3.182 1.06 1.06-3.182A2 2 0 019 13z"/>
      </svg>
    </button>
    <button 
      class="p-2 rounded-lg text-gray-400 hover:text-red-500 hover:bg-red-50 transition" 
      title="Excluir"
      (click)="onDelete()">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M9 7V4h6v3M4 7h16"/>
      </svg>
    </button>
  </div>
</div>
