<div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6 sm:p-8 w-full lg:w-[480px] lg:shrink-0">

  <h2 class="text-xl font-semibold text-gray-900 mb-6">Novo Item</h2>

  <form novalidate #itemForm="ngForm" (ngSubmit)="onSubmit(itemForm)">

    <!-- Title Field -->
    <div class="mb-5">
      <label for="title" class="form-label">
        Título <span class="text-red-500">*</span>
      </label>
      <input
        id="title"
        type="text"
        [(ngModel)]="title"
        name="title"
        placeholder="Ex: Carteira preta"
        required
        maxlength="200"
        #titleInput="ngModel"
        class="form-input"
        [disabled]="isSubmitting() || isProcessingImage()"
        [class.border-red-300]="submitted() && titleInput.invalid"
        [class.focus:ring-red-500]="submitted() && titleInput.invalid"
      />
      <app-form-field-error [control]="titleInput" [submitted]="submitted()" />
    </div>

    <!-- Description Field -->
    <div class="mb-5">
      <label for="description" class="form-label">
        Descrição <span class="text-red-500">*</span>
      </label>
      <textarea
        id="description"
        rows="4"
        [(ngModel)]="description"
        name="description"
        placeholder="Descreva o item encontrado..."
        required
        maxlength="500"
        #descriptionInput="ngModel"
        class="form-input resize-y"
        [disabled]="isSubmitting() || isProcessingImage()"
        [class.border-red-300]="submitted() && descriptionInput.invalid"
        [class.focus:ring-red-500]="submitted() && descriptionInput.invalid"
      ></textarea>
      <app-form-field-error [control]="descriptionInput" [submitted]="submitted()" />
    </div>

    <!-- Date Found Field -->
    <div class="mb-5">
      <label for="dateFound" class="form-label">
        Data Encontrado <span class="text-red-500">*</span>
      </label>
      <input
        id="dateFound"
        type="date"
        [(ngModel)]="dateFound"
        name="dateFound"
        required
        #dateFoundInput="ngModel"
        class="form-input"
        [disabled]="isSubmitting() || isProcessingImage()"
        [class.border-red-300]="submitted() && dateFoundInput.invalid"
        [class.focus:ring-red-500]="submitted() && dateFoundInput.invalid"
      />
      <app-form-field-error [control]="dateFoundInput" [submitted]="submitted()" />
    </div>

    <!-- Location Found Field -->
    <div class="mb-5">
      <label for="locationFound" class="form-label">
        Local Encontrado <span class="text-red-500">*</span>
      </label>
      <input
        id="locationFound"
        type="text"
        [(ngModel)]="locationFound"
        name="locationFound"
        placeholder="Ex: Sala 101, Bloco A"
        required
        maxlength="255"
        #locationFoundInput="ngModel"
        class="form-input"
        [disabled]="isSubmitting() || isProcessingImage()"
        [class.border-red-300]="submitted() && locationFoundInput.invalid"
        [class.focus:ring-red-500]="submitted() && locationFoundInput.invalid"
      />
      <app-form-field-error [control]="locationFoundInput" [submitted]="submitted()" />
    </div>

    <!-- Image Upload Field -->
    <div class="mb-5">
      <label class="form-label">
        Imagem <span class="text-red-500">*</span>
      </label>
      
      <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center transition"
           [class.opacity-50]="isSubmitting() || isProcessingImage()"
           [class.pointer-events-none]="isSubmitting() || isProcessingImage()"
           [class.hover:border-gray-400]="!(isSubmitting() || isProcessingImage())">
        <input
          id="imageUpload"
          type="file"
          accept="image/*"
          capture="environment"
          (change)="onFileSelected($event)"
          [disabled]="isSubmitting() || isProcessingImage()"
          class="hidden"
        />
        <label for="imageUpload" class="cursor-pointer">
          @if (!imagePreviewUrl()) {
            <div class="space-y-2">
              <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
              <p class="text-sm text-gray-600">Clique para adicionar uma foto</p>
              <p class="text-xs text-gray-500">Máximo 8MB</p>
            </div>
          }
          
          @if (imagePreviewUrl()) {
            <img [src]="imagePreviewUrl()" alt="Preview" class="max-h-48 mx-auto rounded-lg object-contain" />
          }
        </label>
      </div>
      
      @if (isProcessingImage()) {
        <p class="mt-2 text-sm text-gray-600 text-center">Processando imagem...</p>
      }
      
      @if (isSubmitting()) {
        <p class="mt-2 text-sm text-gray-600 text-center">Enviando imagem...</p>
      }
      
      @if (submitted() && !selectedImage()) {
        <div class="mt-1.5 p-2 rounded bg-red-50 border border-red-200">
          <p class="text-sm text-red-600">Este campo é obrigatório</p>
        </div>
      }
    </div>

    <!-- Contact Info Field -->
    <div class="mb-7">
      <label for="contactInfo" class="form-label">Informações de Contato</label>
      <input
        id="contactInfo"
        type="text"
        [(ngModel)]="contactInfo"
        name="contactInfo"
        placeholder="Ex: (11) 99999-9999"
        class="form-input"
        [disabled]="isSubmitting() || isProcessingImage()"
      />
    </div>

    <!-- Submit Button -->
    <button
      type="submit"
      [disabled]="isSubmitting() || isProcessingImage()"
      class="w-full bg-gray-900 hover:bg-gray-700 active:bg-gray-950 text-white font-semibold text-sm py-3 rounded-xl transition-colors duration-150 enabled:cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed"
    >
      @if (isSubmitting()) {
        <span class="flex items-center justify-center gap-2">
          <div class="animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"></div>
          Cadastrando...
        </span>
      } @else if (isProcessingImage()) {
        <span class="flex items-center justify-center gap-2">
          <div class="animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"></div>
          Processando...
        </span>
      } @else {
        Cadastrar Item
      }
    </button>

  </form>

</div>
