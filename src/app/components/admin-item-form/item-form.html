<div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6 sm:p-8 w-full lg:w-[480px] lg:shrink-0">

  <h2 class="text-xl font-semibold text-gray-900 mb-6">Novo Item</h2>

  <div class="mb-5">
    <label class="block text-sm font-medium text-gray-700 mb-1">
      Título <span class="text-red-500">*</span>
    </label>
    <input
      type="text"
      placeholder="Ex: Carteira preta"
      class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent transition"
    />
  </div>

  <div class="mb-5">
    <label class="block text-sm font-medium text-gray-700 mb-1">
      Descrição <span class="text-red-500">*</span>
    </label>
    <textarea
      rows="4"
      placeholder="Descreva o item encontrado..."
      class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent transition resize-y"
    ></textarea>
  </div>

  <div class="mb-5 flex gap-4">
    <div class="flex-1 min-w-0">
      <label class="block text-sm font-medium text-gray-700 mb-1">
        Data Encontrado <span class="text-red-500">*</span>
      </label>
      <input
        type="date"
        class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent transition"
      />
    </div>

  </div>

  <div class="mb-5">
    <label class="block text-sm font-medium text-gray-700 mb-1">
      Local Encontrado <span class="text-red-500">*</span>
    </label>
    <input
      type="text"
      placeholder="Ex: Sala 101, Bloco A"
      class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent transition"
    />
  </div>

  <div class="mb-5">
    <label class="block text-sm font-medium text-gray-700 mb-1">URL da Imagem</label>
    <input
      type="url"
      placeholder="https://exemplo.com/imagem.jpg"
      class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent transition"
    />
  </div>

  <div class="mb-7">
    <label class="block text-sm font-medium text-gray-700 mb-1">Informações de Contato</label>
    <input
      type="text"
      placeholder="Ex: João - (11) 99999-9999"
      class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent transition"
    />
  </div>

  <button
    type="button"
    class="w-full bg-gray-900 hover:bg-gray-700 active:bg-gray-950 text-white font-semibold text-sm py-3 rounded-xl transition-colors duration-150"
  >
    Cadastrar Item
  </button>

</div>
