<div class="px-8 py-9 sm:px-10">

  <!-- Error Message -->
  @if (error()) {
    <div class="mb-5 p-3 rounded-lg bg-red-50 border border-red-200">
      <p class="text-sm text-red-600">{{ error() }}</p>
    </div>
  }
  <!-- /Error Message -->

  <form novalidate #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)">

    <!-- Email Field -->
    <div class="mb-5">
      <label for="email" class="block text-sm font-medium text-gray-700 mb-1.5">
        Email
      </label>
      <input
        id="email"
        type="email"
        [(ngModel)]="email"
        name="email"
        placeholder="admin@ufind.com"
        autocomplete="email"
        required
        email
        #emailInput="ngModel"
        class="input-brand w-full rounded-lg border border-gray-300 bg-white px-4 py-2.5
               text-sm text-gray-900 placeholder-gray-400 transition duration-150 ease-in-out"
        [class.border-red-300]="submitted() && emailInput.invalid"
      />
      <app-form-field-error [control]="emailInput" [submitted]="submitted()" />
    </div>
    <!-- /Email Field -->

    <!-- Password Field -->
    <div class="mb-7">
      <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">
        Senha
      </label>
      <input
        id="password"
        type="password"
        [(ngModel)]="password"
        name="password"
        placeholder="••••••••"
        autocomplete="current-password"
        required
        #passwordInput="ngModel"
        class="input-brand w-full rounded-lg border border-gray-300 bg-white px-4 py-2.5
               text-sm text-gray-900 placeholder-gray-400 transition duration-150 ease-in-out"
        [class.border-red-300]="submitted() && passwordInput.invalid"
      />
      <app-form-field-error [control]="passwordInput" [submitted]="submitted()" />
    </div>
    <!-- /Password Field -->

    <!-- Submit Button -->
    <button
      type="submit"
      [disabled]="loading()"
      class="w-full text-white text-sm font-semibold rounded-lg py-3 px-4
             transition-all duration-150 ease-in-out cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed"
      style="background-color: #2BAB6F;"
      onmouseover="this.style.backgroundColor='#229058'"
      onmouseout="this.style.backgroundColor='#2BAB6F'"
      onmousedown="this.style.backgroundColor='#1a7a4a'"
      onmouseup="this.style.backgroundColor='#229058'"
      onfocus="this.style.boxShadow='0 0 0 3px rgba(43,171,111,0.3)'"
      onblur="this.style.boxShadow='none'"
    >
      @if (loading()) {
        Entrando...
      } @else {
        Entrar
      }
    </button>
    <!-- /Submit Button -->

  </form>
</div>
