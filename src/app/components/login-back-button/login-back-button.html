<button
  onclick="history.back()"
  type="button"
  class="inline-flex items-center gap-1.5 text-sm font-medium text-white/70
         hover:text-white transition duration-150 ease-in-out group cursor-pointer"
  aria-label="Voltar para a página anterior"
>
  <svg
    xmlns="http://www.w3.org/2000/svg"
    class="w-4 h-4 transition-transform duration-150 group-hover:-translate-x-0.5"
    fill="none"
    viewBox="0 0 24 24"
    stroke="currentColor"
    stroke-width="2"
  >
    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
  </svg>
  Voltar
</button>
