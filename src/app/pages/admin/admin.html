<header-component [showAdminButton]="false" />

<div class="bg-gray-50 min-h-screen p-4 sm:p-8">

  <div class="max-w-6xl mx-auto w-full">

    <div class="flex flex-col lg:flex-row gap-6 lg:gap-8 w-full">

      <app-item-form 
        [itemId]="editingItemId()"
        (itemRegistered)="onItemRegistered()" 
      />

      <app-admin-items-list 
        #itemsList
        (editItem)="onEditItem($event)"
        (deleteItem)="onDeleteItem($event)"
        (claimItem)="onClaimItem($event)"
      />

    </div>
  </div>

  @if (claimingItemId()) {
    <app-claim-item-modal
      [itemId]="claimingItemId()!"
      (itemClaimed)="onItemClaimed()"
      (closeModal)="onCloseClaimModal()"
    />
  }

</div>
